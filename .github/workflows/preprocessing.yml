name: 2. Preprocessing Pipeline (Layer 2 - 3.7)

on:
  schedule:
    # 1. Setelah Ingestion 00:13 UTC -> Prep mulai 00:45 UTC (07:45 WIB)
    - cron: '45 0 * * *'
    
    # 2. Setelah Ingestion 05:19 UTC -> Prep mulai 05:55 UTC (12:55 WIB)
    - cron: '55 5 * * *'
    
    # 3. Setelah Ingestion 10:23 UTC -> Prep mulai 10:55 UTC (17:55 WIB)
    - cron: '55 10 * * *'
    
    # 4. Setelah Ingestion 15:41 UTC -> Prep mulai 16:15 UTC (23:15 WIB)
    - cron: '15 16 * * *'
    
  workflow_dispatch: # Tetap bisa dijalankan manual untuk debugging

jobs:
  run-prep-pipeline:
    name: Run Enricher -> Validation -> Entity -> Context -> Readiness
    runs-on: ubuntu-latest
    timeout-minutes: 45 # Batas waktu aman untuk Free Tier
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # TIDAK PERLU download model spaCy karena kita pakai Regex murni
          
            # 1. ENRICHER WORKER
      - name: Run Enricher Worker
        run: python main.py run-worker enricher --limit 250
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # 2. VALIDATION WORKER
      - name: Run Validation Worker
        run: python main.py run-worker validation --limit 250
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # 3. PREPROCESSING WORKER
      - name: Run Preprocessing Worker
        run: python main.py run-worker preprocessing --limit 250
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # 4. ENTITY RESOLUTION WORKER
      - name: Run Entity Resolution Worker
        run: python main.py run-worker entity --limit 250
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # 5. CONTEXT WORKER
      - name: Run Context Worker
        run: python main.py run-worker context --limit 250
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # 6. NLP READINESS WORKER
      - name: Run NLP Readiness Worker
        run: python main.py run-worker readiness --limit 250
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}