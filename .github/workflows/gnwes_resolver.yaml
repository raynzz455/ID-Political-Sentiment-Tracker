name: 4. GNews Background Resolver (Microservice)

on:
  schedule:
    - cron: '0 */6 * * *' # Tiap 6 jam
  workflow_dispatch:

jobs:
  run-resolver:
    name: Run GNews Resolver
    runs-on: ubuntu-latest # Runner berbeda dari Enricher
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Run GNews Resolver
        run: python main.py run-worker gnews_resolver --limit 100
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}