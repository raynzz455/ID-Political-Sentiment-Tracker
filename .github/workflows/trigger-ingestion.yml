name: RSS Backup, GNews, DDG & Enricher

on:
  schedule:
    - cron: '13 0 * * *'
    - cron: '19 5 * * *'
    - cron: '23 10 * * *'
    - cron: '41 15 * * *'
  workflow_dispatch:

jobs:
  trigger-rss-backup:
    name: Trigger RSS Ingestion (Backup)
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Supabase Edge Function
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            --request POST --max-time 90 \
            --header "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            --header "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SUPABASE_EDGE_FUNCTION_URL }}")
          if [ "$HTTP_STATUS" -ne 200 ]; then exit 1; fi

  fetch-gnews:
    name: Fetch Google News (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Dependencies
        working-directory: packages/nlp-worker
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run GNews Fetcher
        working-directory: packages/nlp-worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python gnews_fetcher.py

  fetch-ddg:
    name: Fetch DuckDuckGo News (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Dependencies
        working-directory: packages/nlp-worker
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run DDG Fetcher
        working-directory: packages/nlp-worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python ddg_fetcher.py

  run-enricher:
    name: Run Enricher Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Dependencies
        working-directory: packages/nlp-worker
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Enricher Worker
        working-directory: packages/nlp-worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python enricher_worker.py --max-total 300