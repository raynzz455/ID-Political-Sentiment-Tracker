# ──────────────────────────────────────────────────────────────────
# ID-Political-Sentiment-Tracker — Ingestion Scheduler (BACKUP)
#
# UPDATE: Primary scheduler sekarang pg_cron + pg_net di dalam Supabase
# (lihat packages/db/migrations/008_pgcron_trigger_ingestion.sql) --
# presisi ~1 menit, vs GitHub Actions yang documented "best effort"
# dan diobservasi delay 2-3 jam di project ini.
#
# Workflow ini tetap ada sebagai BACKUP (1x/hari, jaga-jaga kalau
# pg_cron di Supabase down) + manual trigger untuk debugging.
# ──────────────────────────────────────────────────────────────────

name: RSS Ingestion Trigger (Backup)

on:
  schedule:
    # 07:13 WIB
    - cron: '13 0 * * *'

    # 12:19 WIB
    - cron: '19 5 * * *'

    # 17:23 WIB
    - cron: '23 10 * * *'

    # 22:41 WIB
    - cron: '41 15 * * *'

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'manual test / debug'

jobs:
  trigger-ingestion:
    name: Trigger RSS Ingestion (Backup/Manual)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger Supabase Edge Function
        id: invoke
        run: |
          echo "Triggering RSS ingestion at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "NOTE: ini backup trigger. Primary scheduler ada di pg_cron Supabase."

          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            --request POST \
            --max-time 90 \
            --header "Content-Type: application/json" \
            --header "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            --header "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SUPABASE_EDGE_FUNCTION_URL }}")

          echo "HTTP Status: $HTTP_STATUS"
          cat /tmp/response.json | python3 -m json.tool 2>/dev/null || cat /tmp/response.json

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::error::Edge Function returned HTTP $HTTP_STATUS"
            exit 1
          fi

      - name: Log summary
        if: always()
        run: |
          echo "=== Backup Ingestion Trigger ==="
          echo "Time   : $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "Status : ${{ job.status }}"
          echo "Reminder: cek juga cron.job_run_details di Supabase untuk primary scheduler"
