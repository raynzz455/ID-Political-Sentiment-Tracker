# ──────────────────────────────────────────────────────────────────
# ID-Political-Sentiment-Tracker — Ingestion Scheduler
# Trigger: GitHub Actions cron (gratis untuk public repo, unlimited minutes)
#
# Yang dilakukan workflow ini BUKAN menjalankan Python/NLP di sini.
# Ini hanya memanggil Supabase Edge Function via HTTP POST.
# Semua logika RSS fetch + insert ada di Edge Function (Deno).
#
# Setup secrets (Settings → Secrets → Actions):
#   SUPABASE_EDGE_FUNCTION_URL  → https://<project>.supabase.co/functions/v1/rss-ingestion
#   SUPABASE_ANON_KEY           → eyJ... (anon key, untuk invoke Edge Function)
#   CRON_SECRET                 → string acak (mis. `openssl rand -hex 32`)
#                                 WAJIB sama dengan secret di Edge Function env.
#                                 Tanpa ini, Edge Function akan tolak 401.
# ──────────────────────────────────────────────────────────────────

name: RSS Ingestion Trigger

on:
  schedule:
    # Setiap 30 menit (cron expression dalam UTC)
    # Jadwal ini optimal untuk news RSS; Google News RSS lebih jarang update
    - cron: '*/30 * * * *'

  # Manual trigger dari GitHub UI (Actions → Run workflow)
  # Berguna untuk test pertama kali tanpa nunggu cron
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'manual test'

jobs:
  trigger-ingestion:
    name: Trigger RSS Ingestion
    runs-on: ubuntu-latest
    timeout-minutes: 5        # Edge Function harus selesai < 5 menit total

    steps:
      - name: Trigger Supabase Edge Function
        id: invoke
        run: |
          echo "Triggering RSS ingestion at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"

          # Jitter 0-59s agar tidak selalu tepat :00/:30 — mengurangi pola bot
          # yang gampang dideteksi publisher (Detik/Kompas/Google News).
          SLEEP=$((RANDOM % 60))
          echo "Jitter sleep: ${SLEEP}s"
          sleep $SLEEP

          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            --request POST \
            --max-time 90 \
            --header "Content-Type: application/json" \
            --header "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            --header "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SUPABASE_EDGE_FUNCTION_URL }}")

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response:"
          cat /tmp/response.json | python3 -m json.tool 2>/dev/null || cat /tmp/response.json

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::error::Edge Function returned HTTP $HTTP_STATUS"
            exit 1
          fi

          # Extract total_inserted from response for logging
          INSERTED=$(cat /tmp/response.json | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(d.get('total_inserted', 'N/A'))
          " 2>/dev/null || echo "N/A")

          echo "total_inserted=$INSERTED" >> $GITHUB_OUTPUT
          echo "Total inserted: $INSERTED new items"

      - name: Log summary
        if: always()
        run: |
          echo "=== Ingestion Summary ==="
          echo "Time     : $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "Inserted : ${{ steps.invoke.outputs.total_inserted }}"
          echo "Status   : ${{ job.status }}"
