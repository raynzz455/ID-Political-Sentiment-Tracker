# ──────────────────────────────────────────────────────────────────
# ID-Political-Sentiment-Tracker — Ingestion Scheduler (BACKUP + Python Workers)
#
# Primary scheduler untuk RSS ada di pg_cron Supabase.
# Workflow ini menjalankan 3 tugas 4x sehari (sesuai jadwal di bawah):
#   1. Backup trigger RSS (jaga-jaga pg_cron down)
#   2. Fetch Google News per-tokoh (Python)
#   3. Enricher Worker (Fetch full body artikel via trafilatura)
# ──────────────────────────────────────────────────────────────────

name: RSS Backup, GNews & Enricher

on:
  schedule:
    # 07:13 WIB
    - cron: '13 0 * * *'

    # 12:19 WIB
    - cron: '19 5 * * *'

    # 17:23 WIB
    - cron: '23 10 * * *'

    # 22:41 WIB
    - cron: '41 15 * * *'

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'manual test / debug'

jobs:
  # ──────────────────────────────────────────────────
  # JOB 1: Backup Trigger untuk RSS Native (Deno)
  # ──────────────────────────────────────────────────
  trigger-rss-backup:
    name: Trigger RSS Ingestion (Backup)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger Supabase Edge Function
        run: |
          echo "Triggering RSS ingestion at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "NOTE: ini backup trigger. Primary scheduler ada di pg_cron Supabase."

          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            --request POST \
            --max-time 90 \
            --header "Content-Type: application/json" \
            --header "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            --header "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SUPABASE_EDGE_FUNCTION_URL }}")

          echo "HTTP Status: $HTTP_STATUS"
          cat /tmp/response.json | python3 -m json.tool 2>/dev/null || cat /tmp/response.json

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::error::Edge Function returned HTTP $HTTP_STATUS"
            exit 1
          fi

  # ──────────────────────────────────────────────────
  # JOB 2: GNews Fetcher (Python)
  # ──────────────────────────────────────────────────
  fetch-gnews:
    name: Fetch Google News (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Dependencies
        working-directory: packages/nlp-worker
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run GNews Fetcher
        working-directory: packages/nlp-worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python gnews_fetcher.py

  # ──────────────────────────────────────────────────
  # JOB 3: Enricher Worker (Python / Layer 2.5)
  # ──────────────────────────────────────────────────
  run-enricher:
    name: Run Enricher Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Dependencies
        working-directory: packages/nlp-worker
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Enricher Worker
        working-directory: packages/nlp-worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        # Batasi 300 artikel per run (cukup untuk sapu data 4x sehari)
        run: python enricher_worker.py --limit 300