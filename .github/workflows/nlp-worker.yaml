name: 3. NLP Inference Worker

on:
  schedule:
    - cron: '45 */2 * * *' # Tiap 2 jam di menit ke-45
  workflow_dispatch:

jobs:
  run-nlp:
    name: Run Layer 4 (IndoBERT)
    runs-on: ubuntu-latest
    timeout-minutes: 60 # NLP berat, butuh waktu lama
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Run NLP Worker
        # Menggunakan --target 1000 agar tidak kena timeout GitHub Actions (6 jam)
        run: python main.py run-nlp --target 1000 --batch-size 30
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}